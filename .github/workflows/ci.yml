# Lint, test, and build on every PR and push to main.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ADMIN_TOKEN: dev-admin-change-me
          DEMO_TOKEN: ci-demo-token
          DATABASE_PATH: /tmp/incidentbuddy-ci.db
        run: pytest tests -q --tb=short

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        env:
          BACKEND_URL: http://127.0.0.1:8000
        run: npm run build

  docker:
    name: Dockerfiles build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deploy/Dockerfile.backend -t incident-buddy-api:ci .

      - name: Build UI image
        run: |
          docker build -f deploy/Dockerfile.frontend \
            --build-arg BACKEND_URL=http://127.0.0.1:8000 \
            -t incident-buddy-ui:ci .
